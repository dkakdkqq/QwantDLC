name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        id: gradle_build
        run: ./gradlew --no-daemon build --stacktrace --info 2>&1 | tee build.log
        continue-on-error: true

      - name: List built jars
        if: always()
        run: ls -la build/libs/ 2>/dev/null || echo "no jars"

      - name: Report build failure as issue
        if: steps.gradle_build.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('build.log', 'utf8');
            } catch (_) { log = '<no build.log>'; }
            // Last ~25k chars to fit issue body limit (65k).
            const tail = log.slice(-25000);
            const title = `CI build failed for ${context.sha.substring(0,7)}`;
            const body = [
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              '',
              '<details><summary>build.log (tail)</summary>',
              '',
              '```',
              tail,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure']
            });

      - name: Fail job if build failed
        if: steps.gradle_build.outcome != 'success'
        run: exit 1

      - name: Upload JAR artifact
        if: steps.gradle_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: qwantdlc-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish "latest" rolling release with jar
        if: steps.gradle_build.outcome == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build from commit ${{ github.sha }}.
            Drop the jar in `.minecraft/mods/` together with Fabric Loader >= 0.16.10 and Fabric API for 1.21.4.
          files: build/libs/*.jar
          prerelease: false
          make_latest: "true"
