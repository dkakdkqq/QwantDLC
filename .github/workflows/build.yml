name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon build --stacktrace

      - name: List built jars
        if: always()
        run: ls -la build/libs/ || true

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwantdlc-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish "latest" rolling release with jar
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build from commit ${{ github.sha }}.
            Download the jar below and put it in `.minecraft/mods/` along with Fabric Loader 0.16.10+ and Fabric API for 1.21.4.
          files: build/libs/*.jar
          prerelease: false
          make_latest: "true"
